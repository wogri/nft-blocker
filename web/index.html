<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Blocker</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --green: #22c55e;
    --green-bg: #052e16;
    --red: #ef4444;
    --red-bg: #450a0a;
    --blue: #3b82f6;
    --blue-hover: #2563eb;
    --orange: #f97316;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LOGIN */
  #login-view {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-card h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }
  .login-card p {
    color: var(--text-muted);
    font-size: 0.875rem;
    margin-bottom: 1.5rem;
  }
  .login-card input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-size: 1rem;
    margin-bottom: 1rem;
    outline: none;
  }
  .login-card input:focus { border-color: var(--blue); }
  .login-card .error { color: var(--red); font-size: 0.85rem; margin-bottom: 0.75rem; display: none; }

  /* DASHBOARD */
  #dashboard-view { display: none; }
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  header h1 { font-size: 1.5rem; }
  .badge {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-ok { background: var(--green-bg); color: var(--green); }
  .badge-blocked { background: var(--red-bg); color: var(--red); }

  /* BLOCK-ALL BANNER */
  .block-all-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .block-all-banner.active {
    border-color: var(--red);
    background: var(--red-bg);
  }
  .block-all-banner .label {
    font-weight: 600;
    font-size: 1rem;
  }
  .block-all-banner .sublabel {
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  /* GROUP CARDS */
  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .group-card.blocked { border-color: var(--red); }
  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .group-name { font-weight: 600; font-size: 1.05rem; }
  .mac-list {
    color: var(--text-muted);
    font-size: 0.8rem;
    font-family: monospace;
    margin-bottom: 1rem;
  }
  .group-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .countdown {
    color: var(--orange);
    font-size: 0.85rem;
    font-weight: 500;
    margin-left: auto;
  }

  /* BUTTONS */
  .btn {
    padding: 0.5rem 1.1rem;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    color: #fff;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-blue { background: var(--blue); }
  .btn-blue:hover:not(:disabled) { background: var(--blue-hover); }
  .btn-red { background: var(--red); }
  .btn-red:hover:not(:disabled) { background: #dc2626; }
  .btn-green { background: var(--green); }
  .btn-green:hover:not(:disabled) { background: #16a34a; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover:not(:disabled) { background: var(--surface2); }

  select {
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--blue); }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1.25rem;
    font-size: 0.85rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="login-view">
  <div class="login-card">
    <h1>🔒 NFT Blocker</h1>
    <p>Enter the admin password to continue</p>
    <div class="error" id="login-error"></div>
    <input type="password" id="login-password" placeholder="Password" autofocus>
    <button class="btn btn-blue" style="width:100%;padding:0.75rem" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- DASHBOARD VIEW -->
<div id="dashboard-view">
  <div class="container">
    <header>
      <h1>🛡️ NFT Blocker</h1>
      <span id="refresh-indicator" style="color:var(--text-muted);font-size:0.75rem"></span>
    </header>

    <!-- Block All Banner -->
    <div class="block-all-banner" id="block-all-banner">
      <div>
        <div class="label">Block All Internet</div>
        <div class="sublabel" id="block-all-iface"></div>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <span id="block-all-badge"></span>
        <button class="btn btn-red" id="block-all-btn" onclick="toggleBlockAll()">Block All</button>
      </div>
    </div>

    <div id="groups-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REFRESH_INTERVAL = 10000;
let authenticated = false;
let statusData = null;

// Toast
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

// API helper
async function api(url, method, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(url, opts);
  if (resp.status === 401) {
    authenticated = false;
    showView();
    throw new Error('Unauthorized');
  }
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// Login
async function doLogin() {
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  try {
    await api('/login', 'POST', { password: pw });
    authenticated = true;
    showView();
    refreshStatus();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !authenticated) doLogin();
});

// View switching
function showView() {
  document.getElementById('login-view').style.display = authenticated ? 'none' : 'flex';
  document.getElementById('dashboard-view').style.display = authenticated ? 'block' : 'none';
}

// Status refresh
async function refreshStatus() {
  if (!authenticated) return;
  try {
    statusData = await api('/api/status', 'GET');
    renderDashboard();
  } catch (e) {
    if (e.message !== 'Unauthorized') console.error(e);
  }
}

function renderDashboard() {
  if (!statusData) return;

  // Block all banner
  const banner = document.getElementById('block-all-banner');
  const badge = document.getElementById('block-all-badge');
  const btn = document.getElementById('block-all-btn');
  banner.className = 'block-all-banner' + (statusData.block_all ? ' active' : '');
  badge.innerHTML = statusData.block_all
    ? '<span class="badge badge-blocked">BLOCKED</span>'
    : '<span class="badge badge-ok">ACTIVE</span>';
  btn.textContent = statusData.block_all ? 'Unblock All' : 'Block All';
  btn.className = statusData.block_all ? 'btn btn-green' : 'btn btn-red';

  // Groups
  const container = document.getElementById('groups-container');
  container.innerHTML = '';
  for (const g of statusData.groups) {
    const card = document.createElement('div');
    card.className = 'group-card' + (g.blocked ? ' blocked' : '');

    let countdownHtml = '';
    if (g.blocked && g.blocked_until) {
      const remaining = new Date(g.blocked_until) - Date.now();
      if (remaining > 0) {
        countdownHtml = `<span class="countdown">${formatDuration(remaining)}</span>`;
      } else {
        countdownHtml = `<span class="countdown">Expiring...</span>`;
      }
    } else if (g.blocked) {
      countdownHtml = `<span class="countdown">Forever</span>`;
    }

    card.innerHTML = `
      <div class="group-header">
        <span class="group-name">${esc(g.display_name)}</span>
        ${g.blocked
          ? '<span class="badge badge-blocked">BLOCKED</span>'
          : '<span class="badge badge-ok">ALLOWED</span>'}
      </div>
      <div class="mac-list">${g.mac_addresses.map(esc).join(' &middot; ')}</div>
      <div class="group-controls">
        <select id="dur-${esc(g.name)}">
          <option value="15m">15 min</option>
          <option value="1h" selected>1 hour</option>
          <option value="2h">2 hours</option>
          <option value="3h">3 hours</option>
          <option value="4h">4 hours</option>
          <option value="5h">5 hours</option>
          <option value="6h">6 hours</option>
          <option value="8h">8 hours</option>
          <option value="10h">10 hours</option>
          <option value="12h">12 hours</option>
          <option value="18h">18 hours</option>
          <option value="24h">1 day</option>
          <option value="48h">2 days</option>
          <option value="72h">3 days</option>
          <option value="96h">4 days</option>
          <option value="120h">5 days</option>
          <option value="144h">6 days</option>
          <option value="168h">7 days</option>
          <option value="forever">Forever</option>
        </select>
        <button class="btn btn-red" onclick="blockGroup('${esc(g.name)}')" ${g.blocked ? 'disabled' : ''}>Block</button>
        <button class="btn btn-green" onclick="unblockGroup('${esc(g.name)}')" ${!g.blocked ? 'disabled' : ''}>Unblock</button>
        ${countdownHtml}
      </div>
    `;
    container.appendChild(card);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${m}m remaining`;
  if (m > 0) return `${m}m ${s}s remaining`;
  return `${s}s remaining`;
}

// Actions
async function blockGroup(name) {
  const dur = document.getElementById('dur-' + name).value;
  try {
    await api('/api/block', 'POST', { group: name, duration: dur });
    showToast('Group blocked');
    refreshStatus();
  } catch (e) { showToast(e.message, true); }
}

async function unblockGroup(name) {
  try {
    await api('/api/unblock', 'POST', { group: name });
    showToast('Group unblocked');
    refreshStatus();
  } catch (e) { showToast(e.message, true); }
}

async function toggleBlockAll() {
  const isBlocked = statusData && statusData.block_all;
  try {
    await api(isBlocked ? '/api/unblock-all' : '/api/block-all', 'POST');
    showToast(isBlocked ? 'All traffic unblocked' : 'All traffic blocked');
    refreshStatus();
  } catch (e) { showToast(e.message, true); }
}

// Init: try to fetch status. If it works, we're already authenticated (cookie).
(async function init() {
  try {
    statusData = await api('/api/status', 'GET');
    authenticated = true;
  } catch (e) {
    authenticated = false;
  }
  showView();
  if (authenticated) renderDashboard();
  setInterval(refreshStatus, REFRESH_INTERVAL);
})();
</script>
</body>
</html>
